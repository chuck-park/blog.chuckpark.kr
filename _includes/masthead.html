{% capture logo_path %}{{ site.logo }}{% endcapture %}

<header class="site-header">
  <div class="site-container">
    <div class="site-header__inner">
      <div class="logos">
        <div class="logo logo-desktop">
          <a class="site-brand" href="{{ '/' | relative_url }}">
            {% unless logo_path == empty %}
              <span class="site-brand__mark">
                <img src="{{ logo_path | relative_url }}" alt="{{ site.masthead_title | default: site.title }}">
              </span>
            {% endunless %}
            <span class="site-brand__text">{{ site.masthead_title | default: site.title }}</span>
          </a>
        </div>
      </div>

      <div class="site-header__actions">
        <nav id="site-nav" class="menu-main" aria-label="주 메뉴">
          <ul>
            {%- for link in site.data.navigation.main -%}
              <li class="{% if page.url == link.url %}active{% endif %}">
                <a href="{{ link.url | relative_url }}"{% if link.description %} title="{{ link.description }}"{% endif %}>{{ link.title }}</a>
              </li>
            {%- endfor -%}
          </ul>
        </nav>

        <div class="site-header__buttons">
          <button class="theme-toggle" type="button" aria-label="테마 변경">
            <span class="visually-hidden">테마 변경</span>
            <span class="theme-toggle__icon theme-toggle__icon--sun">☀</span>
            <span class="theme-toggle__icon theme-toggle__icon--moon">☾</span>
          </button>

          <button class="site-header__toggle" type="button" aria-expanded="false" aria-controls="site-nav">
            <span class="visually-hidden">{{ site.data.ui-text[site.locale].menu_label | default: "메뉴 열기" }}</span>
            <span class="site-header__toggle-line"></span>
            <span class="site-header__toggle-line"></span>
            <span class="site-header__toggle-line"></span>
          </button>
        </div>
      </div>
    </div>
  </div>
</header>
